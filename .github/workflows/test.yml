name: Style and Test
on:
  pull_request:
    branches:
      - main
  push:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Ruff
        run: |
          poetry run ruff check src
      - name: Type checking
        run: |
          poetry run ty check src
      - name: Run tests
        run: |
          poetry run pytest --cov-fail-under=90 tests
